<!-- БАННЕР CAPITAL SHIELD AI — ЧАСТЬ 1 -->
<div id="cs-isolated-hero">
  <style>
    #cs-isolated-hero {
      position: relative !important;
      width: 100% !important;
      min-height: 380px !important;
      background: radial-gradient(circle at 85% 50%, #0c1020 0%, #050508 100%) !important;
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      overflow: hidden !important;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
      border-bottom: 2px solid #1a1a24 !important;
      box-sizing: border-box !important;
      padding: 30px 40px !important;
      margin: 0 0 40px 0 !important;
      z-index: 99999 !important;
    }
    #cs-isolated-hero::before {
      content: '' !important;
      position: absolute !important;
      top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
      background-image: 
        linear-gradient(rgba(0, 123, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 123, 255, 0.04) 1px, transparent 1px) !important;
      background-size: 25px 25px !important;
      pointer-events: none !important;
      z-index: 1 !important;
    }
    #cs-isolated-hero .cs-text-side {
      position: relative !important;
      z-index: 3 !important;
      max-width: 60% !important;
      text-align: left !important;
    }
    #cs-isolated-hero .cs-brand-tag {
      font-size: 13px !important;
      text-transform: uppercase !important;
      letter-spacing: 5px !important;
      color: #007bff !important;
      font-weight: 800 !important;
      margin-bottom: 12px !important;
      text-shadow: 0 0 15px rgba(0, 123, 255, 0.5) !important;
    }
    #cs-isolated-hero .cs-main-title {
      font-size: 38px !important;
      font-weight: 800 !important;
      color: #ffc107 !important;
      line-height: 1.2 !important;
      margin: 0 0 15px 0 !important;
      text-shadow: 0 0 20px rgba(255, 193, 7, 0.2) !important;
    }
    #cs-isolated-hero .cs-main-title span {
      color: #ffffff !important;
      font-size: 28px !important;
      font-weight: 700 !important;
      display: block !important;
      margin-top: 4px !important;
      text-shadow: none !important;
    }
    #cs-isolated-hero .cs-subtitle {
      font-size: 15px !important;
      color: #a0a0b0 !important;
      line-height: 1.4 !important;
      margin: 0 0 25px 0 !important;
    }
    #cs-isolated-hero .cs-badges-row {
      display: flex !important;
      gap: 10px !important;
      flex-wrap: wrap !important;
    }
    #cs-isolated-hero .cs-badge {
      background: rgba(255, 255, 255, 0.03) !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      padding: 6px 12px !important;
      border-radius: 4px !important;
      font-size: 10px !important;
      color: #d1d1d6 !important;
      text-transform: uppercase !important;
      letter-spacing: 1px !important;
      font-weight: 600 !important;
      display: inline-block !important;
    }
    #cs-isolated-hero .cs-badge.cs-price {
      border-color: rgba(255, 193, 7, 0.4) !important;
      background: rgba(255, 193, 7, 0.05) !important;
      color: #ffc107 !important;
    }
      <!-- БАННЕР CAPITAL SHIELD AI — ЧАСТЬ 2 -->
    #cs-isolated-hero .cs-graphics-side {
      position: relative !important;
      z-index: 2 !important;
      width: 260px !important;
      height: 260px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }
    #cs-isolated-hero .cs-shield-glow {
      position: absolute !important;
      width: 140px !important;
      height: 140px !important;
      background: #0056b3 !important;
      border-radius: 50% !important;
      filter: blur(50px) !important;
      opacity: 0.4 !important;
      animation: csPulseGlow 4s infinite ease-in-out !important;
    }
    #cs-isolated-hero .cs-radar-circle {
      position: absolute !important;
      width: 100% !important;
      height: 100% !important;
      border: 1px dashed rgba(0, 123, 255, 0.25) !important;
      border-radius: 50% !important;
      animation: csRotateRadar 20s linear infinite !important;
      box-sizing: border-box !important;
    }
    #cs-isolated-hero .cs-radar-circle::after {
      content: '' !important;
      position: absolute !important;
      top: 0 !important; left: 50% !important;
      width: 50% !important; height: 50% !important;
      background: conic-gradient(from 0deg, rgba(0, 123, 255, 0.15) 0%, transparent 70%) !important;
      transform-origin: left bottom !important;
      border-radius: 0 100% 0 0 !important;
    }
    #cs-isolated-hero .cs-cyber-shield {
      position: relative !important;
      width: 90px !important;
      height: 105px !important;
      background: #0d0d13 !important;
      border: 2px solid #007bff !important;
      box-shadow: 0 0 20px rgba(0, 123, 255, 0.4), inset 0 0 10px rgba(0, 123, 255, 0.2) !important;
      clip-path: polygon(0% 0%, 100% 0%, 100% 50%, 50% 100%, 0% 50%) !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: center !important;
      z-index: 2 !important;
    }
    #cs-isolated-hero .cs-cyber-shield::before {
      content: '' !important;
      position: absolute !important;
      width: 100% !important;
      height: 3px !important;
      background: linear-gradient(to right, transparent, #ffc107, transparent) !important;
      box-shadow: 0 0 8px #ffc107 !important;
      animation: csScanLine 2.5s infinite linear !important;
    }
    #cs-isolated-hero .cs-shield-logo {
      font-size: 22px !important;
      font-weight: 900 !important;
      color: #ffffff !important;
      letter-spacing: -1px !important;
    }
    #cs-isolated-hero .cs-shield-status {
      font-size: 8px !important;
      color: #007bff !important;
      text-transform: uppercase !important;
      letter-spacing: 2px !important;
      margin-top: 3px !important;
      font-weight: bold !important;
    }
    @keyframes csRotateRadar {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes csScanLine {
      0% { top: 0%; }
      50% { top: 95%; }
      100% { top: 0%; }
    }
    @keyframes csPulseGlow {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.1); opacity: 0.5; }
    }
    @media (max-width: 768px) {
      #cs-isolated-hero {
        flex-direction: column !important;
        justify-content: center !important;
        text-align: center !important;
        padding: 30px 20px !important;
        gap: 30px !important;
      }
      #cs-isolated-hero .cs-text-side {
        max-width: 100% !important;
        text-align: center !important;
      }
      #cs-isolated-hero .cs-main-title { font-size: 28px !important; }
      #cs-isolated-hero .cs-main-title span { font-size: 22px !important; }
      #cs-isolated-hero .cs-badges-row { justify-content: center !important; }
      #cs-isolated-hero .cs-graphics-side { width: 180px !important; height: 180px !important; }
    }
  </style>

  <!-- Текстовый блок баннера -->
  <div class="cs-text-side">
    <div class="cs-brand-tag">Capital Shield AI</div>
    <h2 class="cs-main-title">
      Прогнозный анализ
      <span>+ Полный ИИ-аудит</span>
    </h2>
    <p class="cs-subtitle">
      Узнайте точный срок стабильной работы проекта по Алгоритму 6.0, прежде чем он закроется вместе с вашими деньгами.
    </p>
    <div class="cs-badges-row">
      <div class="cs-badge">🔒 Алгоритм 6.0</div>
      <div class="cs-badge">🔮 Модуль 15</div>
      <div class="cs-badge cs-price">📊 Всего $40</div>
    </div>
  </div>

  <!-- Графический блок баннера -->
  <div class="cs-graphics-side">
    <div class="cs-shield-glow"></div>
    <div class="cs-radar-circle"></div>
    <div class="cs-cyber-shield">
      <div class="cs-shield-logo">CS</div>
      <div class="cs-shield-status">ИИ-Поиск</div>
    </div>
  </div>
</div>
