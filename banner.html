<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capital Shield AI - Рекламный Баннер</title>
  <style>
    /* Сброс стилей и фиксация размера под стандартный рекламный формат 16:9 */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #050508;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    /* Главный контейнер баннера */
    .banner-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-sizing: border-box;
      padding: 40px 60px;
      background: radial-gradient(circle at 80% 50%, #0c1020 0%, #050508 100%);
    }

    /* Фоновая цифровая сетка блокчейна */
    .banner-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        linear-gradient(rgba(0, 86, 179, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 86, 179, 0.04) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 1;
    }

    /* Левая текстовая часть */
    .banner-text {
      position: relative;
      z-index: 3;
      max-width: 55%;
    }

    .brand-tag {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 6px;
      color: #007bff;
      font-weight: 800;
      margin-bottom: 15px;
      text-shadow: 0 0 15px rgba(0, 123, 255, 0.6);
    }

    .main-title {
      font-size: 40px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.15;
      margin: 0 0 15px 0;
    }

    .main-title span {
      color: #ffc107;
      text-shadow: 0 0 20px rgba(255, 193, 7, 0.3);
    }

    .subtitle {
      font-size: 16px;
      color: #a0a0b0;
      line-height: 1.4;
      margin: 0 0 25px 0;
    }

    /* Плашки с преимуществами */
    .badges-row {
      display: flex;
      gap: 12px;
    }

    .badge {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 11px;
      color: #d1d1d6;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .badge.price {
      border-color: rgba(255, 193, 7, 0.4);
      background: rgba(255, 193, 7, 0.05);
      color: #ffc107;
    }

    /* Правая графическая часть - Анимированный ИИ-Щит-Радар */
    .banner-graphics {
      position: relative;
      z-index: 2;
      width: 320px;
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 20px;
    }

    /* Неоновое свечение под щитом */
    .shield-glow {
      position: absolute;
      width: 180px;
      height: 180px;
      background: #0056b3;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.4;
      animation: pulseGlow 4s infinite ease-in-out;
    }

    /* Внешнее кольцо радара */
    .radar-circle {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 1px dashed rgba(0, 123, 255, 0.25);
      border-radius: 50%;
      animation: rotateRadar 25s linear infinite;
    }

    /* Элемент сканирующего луча радара */
    .radar-circle::after {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      width: 50%; height: 50%;
      background: conic-gradient(from 0deg, rgba(0, 123, 255, 0.15) 0%, transparent 70%);
      transform-origin: left bottom;
      border-radius: 0 100% 0 0;
    }

    /* Центральный ИИ-Щит на чистом CSS */
    .cyber-shield {
      position: relative;
      width: 120px;
      height: 140px;
      background: #0d0d13;
      border: 2px solid #007bff;
      box-shadow: 0 0 25px rgba(0, 123, 255, 0.4), inset 0 0 15px rgba(0, 123, 255, 0.2);
      clip-path: polygon(0% 0%, 100% 0%, 100% 50%, 50% 100%, 0% 50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    /* Скан-линия внутри щита */
    .cyber-shield::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 4px;
      background: linear-gradient(to right, transparent, #ffc107, transparent);
      box-shadow: 0 0 10px #ffc107;
      animation: scanLine 2.5s infinite linear;
    }

    .shield-logo {
      font-size: 28px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -1px;
    }

    .shield-status {
      font-size: 9px;
      color: #007bff;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 5px;
      font-weight: bold;
    }

    /* Анимации */
    @keyframes rotateRadar {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes scanLine {
      0% { top: 0%; }
      50% { top: 95%; }
      100% { top: 0%; }
    }

    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.2); opacity: 0.5; }
    }

    /* Адаптивность для мобильных превью */
    @media (max-width: 768px) {
      .banner-container {
        flex-direction: column;
        justify-content: center;
        text-align: center;
        padding: 30px;
        gap: 30px;
      }
      .banner-text { max-width: 100%; }
      .badges-row { justify-content: center; }
      .banner-graphics { width: 200px; height: 200px; margin-right: 0; }
      .cyber-shield { width: 90px; height: 105px; }
      .main-title { font-size: 28px; }
    }
  </style>
</head>
<body>

  <div class="banner-container">
    <!-- Текстовый оффер компании -->
    <div class="banner-text">
      <div class="brand-tag">Capital Shield AI</div>
      <h1 class="main-title">Полный ИИ-аудит +<br><span>Прогнозный анализ</span></h1>
      <p class="subtitle">
        Узнайте точный срок стабильной работы проекта по Алгоритму 6.0, прежде чем он закроется вместе с вашими деньгами.
      </p>
      
      <div class="badges-row">
        <div class="badge">🔒 Алгоритм 6.0</div>
        <div class="badge">🔮 Модуль 15: Прогноз</div>
        <div class="badge price">📊 Стоимость $40</div>
      </div>
    </div>

    <!-- Интерактивная кибер-графика (Радар + Щит) -->
    <div class="banner-graphics">
      <div class="shield-glow"></div>
      <div class="radar-circle"></div>
      <div class="cyber-shield">
        <div class="shield-logo">CS</div>
        <div class="shield-status">ИИ-Поиск</div>
      </div>
    </div>
  </div>

</body>
</html>
